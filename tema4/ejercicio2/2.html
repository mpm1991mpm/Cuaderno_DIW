<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas id="lienzo" width="500" height="300" style="border:1px solid blue">

    </canvas>
</body>
</html>

<script>
    let hoja = document.getElementById("lienzo");
    let dibujo = hoja.getContext("2d");

    dibujo.fillStyle = "rgba(0, 0, 0, 0)";
    dibujo.fillRect(50, 10, 200, 100)

    dibujo.lineWidth = 1;
    dibujo.strokeStyle = "blue";
    dibujo.strokeRect(50, 10, 200, 100);
</script>
