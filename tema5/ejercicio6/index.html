<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Tiempo en Jaén</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-200 flex justify-center">

    <main class="bg-gray-100 flex flex-row justify-center m-3 rounded-4xl">
        
        <div class="p-5">
            <div class="flex justify-between m-2 mt-5">
                <span class="font-black">El Tiempo en Jaén</span>
                <div class="flex">
                    <span class="text-gray-400 bg-gray-200 rounded-2xl p-1">Caliente</span>
                    <div class="bg-gray-200 rounded-2xl">
                        <div class=""></div>
                        <div class=""></div>
                    </div>
                </div>
            </div>

            <div class="">
                <div class="">
                    <h1 class="text-6xl font-black">Jaén</h1>
                    <p class="text-gray-400 mt-6">Lluvia moderada y fresca.</p>
                    <div class="text-blue-400 bg-blue-200 font-bold rounded-3xl flex justify-center w-50 mt-3">
                        Lluvia moderada y fresca
                    </div>
                </div>

                <div class="flex justify-center items-center mt-8">
                    <div class="pr-5">
                        <div class="">
                            <img src="https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&q=80&w=300" class="w-32 h-32 rounded-full object-cover border-8 border-white">
                        </div>
                    </div>
                    <span class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-pink-800">
                        14°
                    </span>
                </div>
            </div>

            <hr class="hidden">

            <div class="grid grid-cols-2 mt-10 mb-10 gap-4 md:grid-cols-4">
                <div>
                    <p class="text-gray-600">Prob. Lluvia</p>
                    <p class="text-3xl text-blue-700 font-bold">100%</p>
                </div>
                <div>
                    <p class="text-gray-600">Humedad</p>
                    <p class="text-3xl text-green-700 font-bold">92%</p>
                </div>
                <div>
                    <p class="text-gray-600">Viento</p>
                    <p class="text-3xl text-red-600 font-bold">24 <span class="text-xl">km/h</span></p>
                </div>
                <div>
                    <p class="text-gray-600">Índice UV</p>
                    <p class="text-3xl text-yellow-500 font-bold">Bajo</p>
                </div>
            </div>

            <div class="">
                <h3 class="font-black text-2xl">Previsión para la semana</h3>
                
                <div class="flex items-center gap-4 justify-between bg-gray-200 rounded-2xl">
                    <div class="flex justify-between gap-3 p-4">
                        <span class="font-black">Viernes</span>
                        <img src="https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?auto=format&fit=crop&q=80&w=80" class="w-10 h-10 rounded-full object-cover">
                        <span class="text-gray-400">Lluvia persistente</span>
                    </div>
                    <div class="pr-3">
                        <span class="text-red-600 font-bold">13°</span>
                        <span class="text-gray-400 font-bold">9°</span>
                    </div>
                </div>

                <div class="mb-10 mt-3 flex items-center justify-between bg-gray-200 rounded-2xl">
                    <div class="flex justify-between gap-3 p-4">
                        <span class="font-black">Sábado</span>
                        <img src="https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&q=80&w=80" class="w-10 h-10 rounded-full object-cover">
                        <span class="text-gray-400">Lluvia débil</span>
                    </div>
                    <div class="pr-3">
                        <span class="text-red-600 font-bold">12°</span>
                        <span class="text-gray-400 font-bold">8°</span>
                    </div>
                </div>
            </div>

            <div class="md: flex md: justify-between">
                <span class="text-gray-400">Jaén, Andalucía</span>
                <span class="text-gray-400">Actualizado a las 11:55 AM</span>
            </div>
        </div>
    </main>

</body>
</html>
