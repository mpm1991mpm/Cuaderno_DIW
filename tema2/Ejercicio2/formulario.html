<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibernovia</title>
  <link rel="stylesheet" href="formcss.css">
</head>
<header>
  
<body>

  <div class="contenedor">
    <img src="logo.jpeg" alt="Logo Tienda de ibernovia" class="logo">

    <h1>Tienda de Novias</h1>
    <h2>Agenda tu cita</h2>

    <form>
        <img src="vestidos.png" alt="vestidos" class="fondo">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ej: Pepa" >

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" placeholder="Ej. ana@email.com" required>

      <label for="telefono">Teléfono:</label>
      <input type="tel" id="telefono" name="telefono" placeholder="+34 612 345 678">

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" rows="4" placeholder="Que" ></textarea>

      <button type="submit">Enviar</button>
    </form>
  </div>

</body>         
</html>
