     <h2 style="text-align: center;">Formulario </h2>
    
    <form class="formulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" class="campo" placeholder="Nombre">
        
        <label for="email">Email:</label>
        <input type="email" id="email" class="campo" placeholder="email">
        
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" class="campo" placeholder="teléfono">
        
        <button type="submit" class="boton">Enviar Mensaje</button>
    </form>
